services:
  openfang:
    image: ${OPENFANG_IMAGE:-openfang-mahakal:latest}
    container_name: openfang
    restart: unless-stopped
    env_file:
      - .env
    environment:
      OPENFANG_HOME: /data
    volumes:
      - openfang-data:/data
      - ./config.toml:/data/config.toml:ro
    ports:
      - "127.0.0.1:4200:4200"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4200/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

volumes:
  openfang-data:
